<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Connected — AEDAN.MY</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Arabic:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #7A1C1C;
            --brand-hover: #5F1515;
            --canvas-bg: #F3F5F8;
            --surface-card: #FFFFFF;
            --font-dark: #0F1115;
            --font-sub: #64748B;
            --border-line: #E2E8F0;
            --smooth-radius: 14px;
            --color-l26: #e182b4;
            --color-lbam: #1b35b0;
            --color-li: #6dc16d;
            --live-ok: #10B981;
            --live-warn: #F59E0B;
            --live-crit: #EF4444;
        }

        [data-theme="dark"] {
            --canvas-bg: #0A0B0D;
            --surface-card: #12141C;
            --font-dark: #F8FAFC;
            --font-sub: #94A3B8;
            --border-line: #1E293B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.25s, border-color 0.25s; }
        body { background-color: var(--canvas-bg); color: var(--font-dark); padding-bottom: 80px; overflow-x: hidden; position: relative; min-height: 100vh; }
        .line-font font-family: 'Montserrat Arabic', sans-serif; font-weight: 600; }

        .bg-watermark-logo {
            position: fixed; bottom: -80px; right: -80px; height: 50vh; opacity: 0.03;
            pointer-events: none; user-select: none; z-index: 1; transform: rotate(12deg);
            animation: floatSlow 10s ease-in-out infinite;
        }
        [data-theme="dark"] .bg-watermark-logo { opacity: 0.015; }

        @keyframes floatSlow { 0%, 100% { transform: rotate(12deg) translateY(0); } 50% { transform: rotate(15deg) translateY(-15px); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(25px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        header {
            background-color: var(--surface-card); border-bottom: 1px solid var(--border-line);
            padding: 16px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }
        .logo-box-main { display: flex; align-items: center; gap: 12px; }
        .logo-box-main img { height: 38px; }

        .btn-logout { background: transparent; border: 1px solid var(--border-line); color: var(--live-crit); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.08); border-color: var(--live-crit); transform: translateY(-1px); }

        .dark-mode-switch {
            background: var(--canvas-bg); border: 1px solid var(--border-line); width: 38px; height: 38px;
            border-radius: 50%; cursor: pointer; color: var(--font-dark); display: flex; align-items: center; justify-content: center;
        }

        .app-container { max-width: 1240px; margin: 35px auto; padding: 0 24px; position: relative; z-index: 5; }
        
        .panel-heading { margin-bottom: 30px; animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .panel-heading h1 { font-size: 1.8rem; letter-spacing: -0.02em; }

        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }
        .card-panel { background: var(--surface-card); border-radius: var(--smooth-radius); padding: 28px; border: 1px solid var(--border-line); box-shadow: 0 10px 30px rgba(0,0,0,0.01); animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .card-panel h2 { font-size: 1.05rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-line); padding-bottom: 12px; }

        .form-row { margin-bottom: 16px; }
        .form-row label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--font-sub); margin-bottom: 6px; text-transform: uppercase; }
        .form-item { width: 100%; padding: 12px 14px; border: 1px solid var(--border-line); background: var(--canvas-bg); color: var(--font-dark); border-radius: 8px; outline: none; font-size: 0.9rem; }
        .form-item:focus { border-color: var(--brand-color); }
        
        .btn-action { background: var(--brand-color); color: white; border: none; padding: 13px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .btn-action:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(122,28,28,0.15); }

        .service-tile { background: var(--canvas-bg); border-left: 5px solid var(--brand-color); border-radius: 8px; padding: 18px; margin-bottom: 15px; position: relative; transition: transform 0.2s, box-shadow 0.2s; }
        .service-tile:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.03); }
        .tile-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge-line { padding: 3px 10px; border-radius: 6px; color: white; font-weight: 800; font-size: 0.75rem; }

        .table-responsive { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-line); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        th { background: var(--canvas-bg); padding: 12px; color: var(--font-sub); font-weight: 700; }
        td { padding: 12px; border-bottom: 1px solid var(--border-line); }
        
        .status-dot { padding: 4px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; }
        .status-wait { background: #E2E8F0; color: #475569; }
        .status-ok { background: rgba(16, 185, 129, 0.15); color: var(--live-ok); }

        .btn-trash { background: none; border: none; color: var(--live-crit); cursor: pointer; font-size: 0.95rem; transition: transform 0.2s; margin-right: 6px; }
        .btn-trash:hover { transform: scale(1.15); }
        .btn-edit { background: none; border: none; color: var(--live-warn); cursor: pointer; font-size: 0.95rem; transition: transform 0.2s; }
        .btn-edit:hover { transform: scale(1.15); }
    </style>
</head>
<body>

    <img src="https://image.noelshack.com/fichiers/2026/28/2/1783387205-2b6a27e168543ce8099dc90780cd86d6-removebg-preview.png" class="bg-watermark-logo" alt="">

    <header>
        <div class="logo-box-main">
            <img src="https://image.noelshack.com/fichiers/2026/28/2/1783387205-2b6a27e168543ce8099dc90780cd86d6-removebg-preview.png" alt="Logo">
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <button class="btn-logout" onclick="killSession()"><i class="fa-solid fa-power-off"></i> Déconnexion</button>
            <button class="dark-mode-switch" id="theme-toggle-btn"><i class="fa-solid fa-sun"></i></button>
        </div>
    </header>

    <main class="app-container">
        
        <div class="panel-heading">
            <h1 class="line-font">Bonjour <span id="lbl-agent-name">Agent</span> !</h1>
        </div>

        <div id="driver-core-view" class="grid-dashboard" style="display: none;">
            <div class="card-panel" style="grid-column: span 2;">
                <h2 class="line-font" style="color: var(--brand-color);"><i class="fa-solid fa-route"></i> Prochain service</h2>
                <div id="driver-services-bucket"></div>
            </div>

            <div class="card-panel">
                <h2 class="line-font" style="color: var(--live-warn);"><i class="fa-solid fa-circle-exclamation"></i> Signaler un événement</h2>
                <form id="form-driver-report">
                    <div class="form-row">
                        <label>Matériel roulant / N° de rame</label>
                        <input type="text" id="rep-bus" class="form-item" placeholder="Ex: Rame 102" required>
                    </div>
                    <div class="form-row">
                        <label>Commentaire de tournée</label>
                        <textarea id="rep-text" class="form-item" rows="4" style="resize: none;" placeholder="Indiquez toute anomalie ou signalement..." required></textarea>
                    </div>
                    <button type="submit" class="btn-action" style="background: var(--live-warn);">TRANSMETTRE LE RAPPORT</button>
                </form>
            </div>
        </div>

        <div id="admin-core-view" class="grid-dashboard" style="display: none;">
            
            <div class="card-panel">
                <h2 class="line-font" style="color: var(--live-ok);"><i class="fa-solid fa-user-gear"></i> Fichier Personnel & Rôles</h2>
                
                <form id="form-add-driver">
                    <input type="hidden" id="edit-mode-flag" value="false">
                    <div class="form-row"><label>Matricule</label><input type="text" id="add-mat" class="form-item" required></div>
                    <div class="form-row"><label>Nom / Pseudo</label><input type="text" id="add-name" class="form-item" required></div>
                    <div class="form-row"><label>Mot de passe</label><input type="text" id="add-pass" class="form-item" required></div>
                    <div class="form-row">
                        <label>Rôle assigné</label>
                        <select id="add-role" class="form-item"></select>
                    </div>
                    <button type="submit" id="btn-submit-agent" class="btn-action" style="background: var(--live-ok);">INSCRIRE L'AGENT</button>
                </form>

                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Matricule</th><th>Nom</th><th>Rôle</th><th>Code</th><th></th></tr></thead>
                        <tbody id="box-table-drivers"></tbody>
                    </table>
                </div>

                <h2 class="line-font" style="color: var(--color-lbam); margin-top: 30px; font-size: 0.95rem;"><i class="fa-solid fa-tags"></i> Paramétrage des Rôles</h2>
                <form id="form-add-role" style="margin-bottom: 15px;">
                    <div class="form-row">
                        <input type="text" id="role-name-input" class="form-item" placeholder="Nom du nouveau rôle (ex: Contrôleur)" required>
                    </div>
                    <button type="submit" class="btn-action" style="background: var(--color-lbam); padding: 8px;">Créer le rôle</button>
                </form>
                <div id="roles-chips-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>

            <div class="card-panel" style="grid-column: span 2;">
                <h2 class="line-font" style="color: var(--brand-color);"><i class="fa-solid fa-calendar-check"></i> Ordonnancement Horaires</h2>
                <form id="form-add-service" class="grid-dashboard" style="grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 0;">
                    <div class="form-row">
                        <label>Ligne</label>
                        <select id="add-srv-line" class="form-item"><option value="26">Ligne 26</option><option value="BAM">Ligne BAM</option><option value="I">Ligne I</option></select>
                    </div>
                    <div class="form-row"><label>Horaires de Service</label><input type="text" id="add-srv-hours" class="form-item" placeholder="06:00 - 14:00" required></div>
                    <div class="form-row"><label>Matricule Cible</label><input type="text" id="add-srv-target" class="form-item" required></div>
                    <div class="form-row"><label>Mission / Consigne</label><input type="text" id="add-srv-mission" class="form-item" required></div>
                    <button type="submit" class="btn-action" style="grid-column: span 2;">AFFECTER LE SERVICE</button>
                </form>

                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Ligne</th><th>Amplitude</th><th>Matricule</th><th>Mission</th><th>Statut</th><th></th></tr></thead>
                        <tbody id="box-table-services"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const FIREBASE_ENDPOINT = "https://aedan-mobilites-default-rtdb.europe-west1.firebasedatabase.app";
        const colors = { "26": "#e182b4", "BAM": "#1b35b0", "I": "#6dc16d" };

        const uid = sessionStorage.getItem('agent_uid');
        const name = sessionStorage.getItem('agent_name');
        const userRole = sessionStorage.getItem('agent_role') || "Conducteur";

        if(!uid) { window.location.href = "connexion.html"; }
        document.getElementById('lbl-agent-name').textContent = name;

        // Thème Sombre/Clair
        const themeTrigger = document.getElementById('theme-toggle-btn');
        if (localStorage.getItem('user-ui-theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); themeTrigger.innerHTML = '<i class="fa-solid fa-sun"></i>'; }
        themeTrigger.onclick = () => {
            if (document.documentElement.hasAttribute('data-theme')) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('user-ui-theme', 'light'); themeTrigger.innerHTML = '<i class="fa-solid fa-moon"></i>'; }
            else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('user-ui-theme', 'dark'); themeTrigger.innerHTML = '<i class="fa-solid fa-sun"></i>'; }
        };

        function killSession() { sessionStorage.clear(); window.location.href = "connexion.html"; }

        // Redirection Panel Admin si l'UID est ADMIN ou si le rôle contient 'admin'
        if(uid === "ADMIN" || userRole.toLowerCase().includes("admin") || userRole.toLowerCase().includes("administrateur")) { 
            document.getElementById('admin-core-view').style.display = 'grid'; 
        } else { 
            document.getElementById('driver-core-view').style.display = 'grid'; 
        }

        // Actions Conducteur (Prise de poste)
        function toggleShift(sid, current) {
            const updated = current === "Prise de poste validée" ? "En attente" : "Prise de poste validée";
            fetch(`${FIREBASE_ENDPOINT}/services/${sid}/status.json`, { method: 'PUT', body: JSON.stringify(updated) }).then(() => pollData());
        }

        document.getElementById('form-driver-report').onsubmit = (e) => {
            e.preventDefault();
            fetch(`${FIREBASE_ENDPOINT}/rapports_incidents.json`, {
                method: 'POST',
                body: JSON.stringify({ agent: uid, vehicle: document.getElementById('rep-bus').value, text: document.getElementById('rep-text').value, stamp: new Date().toLocaleString() })
            }).then(() => { alert("Rapport transmis."); document.getElementById('form-driver-report').reset(); });
        };

        // Mutation / Ajout d'un Agent (Gestion dynamique des nœuds Firebase en fonction du rôle)
        document.getElementById('form-add-driver').onsubmit = (e) => {
            e.preventDefault();
            const m = document.getElementById('add-mat').value.trim();
            const n = document.getElementById('add-name').value.trim();
            const p = document.getElementById('add-pass').value.trim();
            const r = document.getElementById('add-role').value;
            const isEdit = document.getElementById('edit-mode-flag').value === "true";

            let primaryPath = "conducteurs";
            if (r === "Administrateur") primaryPath = "admins";
            else if (r !== "Conducteur") primaryPath = r.toLowerCase().replace(/[^a-z0-9]/g, "");

            const payload = { name: n, password: p, role: r };

            // Si modification, on nettoie potentiellement l'ancien emplacement Firebase de l'agent
            const saveAction = () => {
                fetch(`${FIREBASE_ENDPOINT}/${primaryPath}/${m}.json`, { method: 'PUT', body: JSON.stringify(payload) })
                .then(() => {
                    document.getElementById('form-add-driver').reset();
                    document.getElementById('edit-mode-flag').value = "false";
                    document.getElementById('add-mat').disabled = false;
                    document.getElementById('btn-submit-agent').textContent = "INSCRIRE L'AGENT";
                    document.getElementById('btn-submit-agent').style.background = "var(--live-ok)";
                    pollData();
                });
            };

            if (isEdit) {
                // Supprime des localisations courantes pour éviter les doublons inter-catégories
                fetch(`${FIREBASE_ENDPOINT}/conducteurs/${m}.json`, { method: 'DELETE' })
                .then(() => fetch(`${FIREBASE_ENDPOINT}/admins/${m}.json`, { method: 'DELETE' }))
                .then(() => fetch(`${FIREBASE_ENDPOINT}/${r.toLowerCase().replace(/[^a-z0-9]/g, "")}/${m}.json`, { method: 'DELETE' }))
                .then(() => saveAction());
            } else {
                saveAction();
            }
        };

        // Modification de l'agent (Pré-remplissage du formulaire)
        function editAgent(matricule, name, password, role) {
            document.getElementById('add-mat').value = matricule;
            document.getElementById('add-mat').disabled = true; // Empêche de modifier la clé primaire unique
            document.getElementById('add-name').value = name;
            document.getElementById('add-pass').value = password;
            document.getElementById('add-role').value = role;
            document.getElementById('edit-mode-flag').value = "true";
            
            const btn = document.getElementById('btn-submit-agent');
            btn.textContent = "MODIFIER L'AGENT";
            btn.style.background = "var(--live-warn)";
        }

        // Suppression d'un agent sur toutes ses branches possibles
        function deleteAgent(matricule, currentRole) {
            if(confirm(`Confirmer le retrait définitif de l'agent ${matricule} ?`)) {
                let cat = "conducteurs";
                if (currentRole === "Administrateur") cat = "admins";
                else if (currentRole !== "Conducteur") cat = currentRole.toLowerCase().replace(/[^a-z0-9]/g, "");

                fetch(`${FIREBASE_ENDPOINT}/${cat}/${matricule}.json`, { method: 'DELETE' }).then(() => pollData());
            }
        }

        // Création dynamique de rôle
        document.getElementById('form-add-role').onsubmit = (e) => {
            e.preventDefault();
            const rName = document.getElementById('role-name-input').value.trim();
            const roleKey = rName.toLowerCase().replace(/[^a-z0-9]/g, "");
            
            if(roleKey === "conducteur" || roleKey === "administrateur" || roleKey === "admins") {
                alert("Ce rôle système est protégé."); return;
            }

            fetch(`${FIREBASE_ENDPOINT}/roles/${roleKey}.json`, { method: 'PUT', body: JSON.stringify({ label: rName }) })
            .then(() => { document.getElementById('form-add-role').reset(); pollData(); });
        };

        // Suppression d'un rôle
        function dropRole(rKey) {
            if(confirm("Supprimer ce rôle ? Les agents possédant ce rôle devront être réassignés.")) {
                fetch(`${FIREBASE_ENDPOINT}/roles/${rKey}.json`, { method: 'DELETE' }).then(() => pollData());
            }
        }

        // Affectation Service
        document.getElementById('form-add-service').onsubmit = (e) => {
            e.preventDefault();
            const payload = {
                line: document.getElementById('add-srv-line').value,
                hours: document.getElementById('add-srv-hours').value.trim(),
                target: document.getElementById('add-srv-target').value.trim(),
                mission: document.getElementById('add-srv-mission').value.trim(),
                status: "En attente"
            };
            fetch(`${FIREBASE_ENDPOINT}/services.json`, { method: 'POST', body: JSON.stringify(payload) })
            .then(() => { document.getElementById('form-add-service').reset(); pollData(); });
        };

        function dropItem(path, key) {
            if(confirm("Confirmer le retrait ?")) {
                fetch(`${FIREBASE_ENDPOINT}/${path}/${key}.json`, { method: 'DELETE' }).then(() => pollData());
            }
        }

        // Synchronisation continue globale
        function pollData() {
            fetch(`${FIREBASE_ENDPOINT}/.json?nocache=${Date.now()}`).then(r => r.json()).then(db => {
                if(!db) return;

                // 1. Render des Rôles disponibles dans le formulaire
                const roleSelect = document.getElementById('add-role');
                const rolesChips = document.getElementById('roles-chips-container');
                
                // Rôles natifs par défaut
                let rolesHTML = `<option value="Conducteur">Conducteur</option><option value="Administrateur">Administrateur</option>`;
                let chipsHTML = `<span class="status-dot status-wait" style="background:#cbd5e1">Conducteur</span><span class="status-dot status-wait" style="background:#cbd5e1">Administrateur</span>`;
                
                if(db.roles) {
                    Object.entries(db.roles).forEach(([rk, rObj]) => {
                        rolesHTML += `<option value="${rObj.label}">${rObj.label}</option>`;
                        chipsHTML += `<span class="status-dot status-wait" style="background:var(--border-line); display:inline-flex; align-items:center; gap:5px;">${rObj.label} <i class="fa-solid fa-xmark" style="cursor:pointer; color:var(--live-crit)" onclick="dropRole('${rk}')"></i></span>`;
                    });
                }
                roleSelect.innerHTML = rolesHTML;
                rolesChips.innerHTML = chipsHTML;

                // 2. Traitement des affichages selon les privilèges de session
                if(document.getElementById('driver-core-view').style.display === 'grid') {
                    // Vue Conducteur ou rôles alternatifs
                    const bucket = document.getElementById('driver-services-bucket');
                    bucket.innerHTML = '';
                    let count = 0;
                    if(db.services) {
                        Object.entries(db.services).forEach(([sid, s]) => {
                            if(s.target === uid) {
                                count++;
                                const col = colors[s.line] || "#64748B";
                                const active = s.status === "Prise de poste validée";
                                bucket.innerHTML += `
                                    <div class="service-tile" style="border-left-color:${col}">
                                        <div class="tile-top">
                                            <span class="badge-line" style="background:${col}">Ligne ${s.line}</span>
                                            <span class="line-font" style="color:var(--brand-color);"><i class="fa-regular fa-clock"></i> ${s.hours}</span>
                                        </div>
                                        <p style="font-size:0.92rem; margin-bottom:15px;"><strong>Mission :</strong> ${s.mission}</p>
                                        <button class="btn-action" style="background:${active ? 'transparent' : 'var(--live-ok)'}; border:${active ? '1px solid var(--border-line)' : 'none'}; color:${active ? 'var(--font-dark)' : 'white'}; width:auto; padding:8px 16px; font-size:0.8rem;" onclick="toggleShift('${sid}', '${s.status}')">
                                            <i class="fa-solid ${active ? 'fa-user-check' : 'fa-play'}"></i> ${active ? 'Prise de poste validée' : 'Valider prise de poste'}
                                        </button>
                                    </div>`;
                            }
                        });
                    }
                    if(count === 0) bucket.innerHTML = `<p style="color:var(--font-sub); font-style:italic;">Aucune affectation aujourd'hui.</p>`;
                } else {
                    // Vue Administrateur consolidée
                    const dTable = document.getElementById('box-table-drivers'); 
                    dTable.innerHTML = '';
                    
                    const appendAgentToTable = (m, o, fallRole) => {
                        const currentR = o.role || fallRole;
                        dTable.innerHTML += `<tr>
                            <td><strong>${m}</strong></td>
                            <td>${o.name}</td>
                            <td><span class="status-dot status-wait">${currentR}</span></td>
                            <td><code>${o.password}</code></td>
                            <td>
                                <button class="btn-edit" onclick="editAgent('${m}', '${o.name}', '${o.password}', '${currentR}')"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn-trash" onclick="deleteAgent('${m}', '${currentR}')"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                    };

                    // Lecture de la catégorie "conducteurs"
                    if(db.conducteurs) {
                        Object.entries(db.conducteurs).forEach(([m, o]) => appendAgentToTable(m, o, "Conducteur"));
                    }
                    // Lecture de la nouvelle catégorie "admins"
                    if(db.admins) {
                        Object.entries(db.admins).forEach(([m, o]) => appendAgentToTable(m, o, "Administrateur"));
                    }
                    // Lecture dynamique des nœuds des rôles personnalisés
                    if(db.roles) {
                        Object.keys(db.roles).forEach(rk => {
                            if(db[rk]) {
                                Object.entries(db[rk]).forEach(([m, o]) => appendAgentToTable(m, o, db.roles[rk].label));
                            }
                        });
                    }

                    // Remplissage de la table des ordonnancements de lignes
                    const sTable = document.getElementById('box-table-services'); sTable.innerHTML = '';
                    if(db.services) {
                        Object.entries(db.services).forEach(([sid, s]) => {
                            const cls = s.status === "Prise de poste validée" ? "status-ok" : "status-wait";
                            sTable.innerHTML += `<tr><td><span class="badge-line" style="background:${colors[s.line] || '#64748B'}">${s.line}</span></td><td>${s.hours}</td><td><strong>${s.target}</strong></td><td>${s.mission}</td><td><span class="status-dot ${cls}">${s.status || 'En attente'}</span></td><td><button class="btn-trash" onclick="dropItem('services', '${sid}')"><i class="fa-solid fa-trash"></i></button></td></tr>`;
                        });
                    }
                }
            });
        }

        pollData();
        setInterval(pollData, 4000);
    </script>
</body>
</html>
