<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeDAN Mobilités</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Arabic:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #7A1C1C;
            --brand-hover: #5F1515;
            --canvas-bg: #F3F5F8;
            --surface-card: #FFFFFF;
            --font-dark: #0F1115;
            --font-sub: #64748B;
            --border-line: #E2E8F0;
            --smooth-radius: 14px;
            
            /* Nouvelles Couleurs Hexadécimales Demandées */
            --color-l26: #e182b4;
            --color-lbam: #1b35b0;
            --color-li: #6dc16d;
            
            --live-ok: #10B981;
            --live-warn: #F59E0B;
            --live-crit: #EF4444;
        }

        [data-theme="dark"] {
            --canvas-bg: #0A0B0D;
            --surface-card: #12141C;
            --font-dark: #F8FAFC;
            --font-sub: #94A3B8;
            --border-line: #1E293B;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background-color: var(--canvas-bg); 
            color: var(--font-dark); 
            padding-bottom: 80px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NOUVELLE POLICE SPÉCIFIQUE (MONTSERRAT ARABIC) --- */
        .line-font {
            font-family: 'Montserrat Arabic', sans-serif;
            font-weight: 600;
        }

        /* --- ANIMATIONS APP --- */
        @keyframes alertSpawn {
            0% { transform: translateY(-100%); opacity: 0; }
            70% { transform: translateY(10px); opacity: 1; }
            100% { transform: translateY(0); }
        }
        @keyframes pulseLogo {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(225,130,180,0.4)); }
            100% { transform: scale(1); opacity: 0.9; }
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- BANDEAU D'ALERTE ANIMÉ --- */
        #app-live-banner {
            width: 100%;
            padding: 14px 6%;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 110;
            animation: alertSpawn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        #app-live-banner .banner-content { display: flex; align-items: center; gap: 10px; margin: 0 auto; }
        #app-live-banner .close-banner-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #FFFFFF; opacity: 0.8; transition: transform 0.2s; }
        #app-live-banner .close-banner-btn:hover { transform: scale(1.2); }

        /* --- HEADER --- */
        .app-bar {
            background-color: var(--surface-card);
            border-bottom: 1px solid var(--border-line);
            padding: 14px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
            transition: background 0.2s ease, border 0.2s ease;
        }

        .app-bar-logo {
            height: 46px;
            width: auto;
            object-fit: contain;
            display: block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .app-bar-logo:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .dark-mode-switch {
            background: var(--canvas-bg);
            border: 1px solid var(--border-line);
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--font-dark);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark-mode-switch:hover {
            border-color: var(--brand-color);
            transform: rotate(-12deg) scale(1.1);
        }

        /* --- TABS --- */
        .navigation-tabs {
            background: var(--surface-card);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border-line);
            gap: 15px;
        }

        .tab-trigger {
            padding: 18px 24px;
            border: none;
            background: none;
            color: var(--font-sub);
            font-size: 0.92rem;
            cursor: pointer;
            position: relative;
            transition: color 0.2s ease;
        }
        .tab-trigger:hover { color: var(--font-dark); }
        .tab-trigger.is-active { color: var(--brand-color); }
        .tab-trigger.is-active::after {
            content: ''; position: absolute; bottom: 0; left: 10px; right: 10px;
            height: 3px; background: var(--brand-color); border-radius: 3px 3px 0 0;
        }

        /* --- HERO BANNER --- */
        .stage-banner {
            background: linear-gradient(135deg, #4A1010 0%, #1E0505 100%);
            padding: 70px 5% 120px 5%;
            text-align: center; color: #FFFFFF;
        }
        .stage-banner h1 { 
            font-size: 2.4rem; 
            letter-spacing: -0.03em;
            margin-bottom: 6px; 
        }
        .stage-banner p { opacity: 0.75; font-size: 1rem; font-weight: 400; }

        /* --- WORKSPACE --- */
        .workspace {
            background: var(--surface-card); 
            max-width: 920px; 
            margin: -60px auto 30px auto;
            padding: 35px; 
            border-radius: var(--smooth-radius); 
            box-shadow: 0 16px 45px rgba(15,17,21,0.04);
            border: 1px solid var(--border-line);
            transition: background 0.2s ease, border 0.2s ease;
        }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; align-items: flex-end; }
        .field-group { position: relative; }
        .field-group label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--font-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .control-input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-line); 
            background: var(--canvas-bg); 
            color: var(--font-dark); 
            border-radius: 10px; 
            outline: none; 
            font-size: 0.95rem; 
            font-weight: 500;
            transition: all 0.15s ease;
        }
        .control-input:focus { border-color: var(--brand-color); box-shadow: 0 0 0 3px rgba(122,28,28,0.1); background: var(--surface-card); }

        /* SUGGESTIONS LIST */
        .dropdown-suggestions {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface-card);
            border: 1px solid var(--border-line); border-radius: 10px; z-index: 10; max-height: 250px; overflow-y: auto; display: none;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        .suggest-row { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-line); align-items: center; font-size: 0.9rem; }
        .suggest-row:last-child { border-bottom: none; }
        .suggest-row:hover { background: var(--canvas-bg); }
        .suggest-row small { color: var(--font-sub); font-weight: 400; margin-left: 5px; }

        .pill-badge { color: #FFFFFF; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
        .pill-badge.l26 { background-color: var(--color-l26); }
        .pill-badge.lbam { background-color: var(--color-lbam); }
        .pill-badge.li { background-color: var(--color-li); }

        .submit-trigger { 
            background: var(--brand-color); 
            color: #FFFFFF; 
            border: none; 
            padding: 0 24px; 
            height: 50px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 0.92rem; 
            width: 100%; 
            transition: all 0.2s ease;
        }
        .submit-trigger:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(122,28,28,0.15); }

        /* --- SQUELETTE LOGO DE CHARGEMENT ANIMÉ --- */
        .skeleton-loader { display: none; text-align: center; max-width: 920px; margin: 20px auto; padding: 40px; background: var(--surface-card); border-radius: var(--smooth-radius); border: 1px solid var(--border-line); }
        .skeleton-loader img { height: 60px; animation: pulseLogo 1.4s ease-in-out infinite; }

        /* --- OUTPUT COMPONENT --- */
        .output-container { max-width: 920px; margin: 20px auto; padding: 35px; background: var(--surface-card); border-radius: var(--smooth-radius); border: 1px solid var(--border-line); display: none; animation: cardReveal 0.4s cubic-bezier(0.215, 0.610, 0.355, 1) forwards; }
        
        .route-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; padding: 18px 22px; background: var(--canvas-bg); border-radius: 12px; border-left: 5px solid var(--route-theme); }
        .route-badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-size: 1.15rem; position: relative; }
        
        /* CERCLE PMR ACCESSIBILITÉ PROPRE SANS TEXTE */
        .pmr-indicator { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: #0F4C81; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; border: 2px solid var(--surface-card); }
        
        .route-meta { display: flex; flex-direction: column; flex-grow: 1; margin-left: 18px; }
        .route-meta-lbl { font-size: 0.72rem; font-weight: 500; color: var(--font-sub); text-transform: lowercase; font-style: italic; }
        .route-meta-val { font-size: 1.1rem; }

        .itinerary-chain { position: relative; padding-left: 35px; margin-left: 12px; }
        .itinerary-chain::before { content: ''; position: absolute; left: 4px; top: 10px; bottom: 10px; width: 4px; background: var(--route-theme); border-radius: 4px; }
        .itinerary-chain.is-walkway::before { background: repeating-linear-gradient(to bottom, var(--border-line), var(--border-line) 6px, transparent 6px, transparent 12px); }

        .chain-node { position: relative; margin-bottom: 24px; font-size: 0.95rem; display: flex; align-items: center; min-height: 24px; }
        .chain-node::before { content: ''; position: absolute; left: -36px; top: calc(50% - 6px); width: 12px; height: 12px; border-radius: 50%; background: var(--surface-card); border: 3px solid var(--route-theme); z-index: 2; }
        .chain-node.is-extremity::before { background: var(--route-theme); scale: 1.25; }

        .node-time { margin-right: 20px; min-width: 50px; color: var(--font-dark); }

        /* COMPOSANT ACCORDÉON ARRÊTS INTERMÉDIAIRES ANIMÉ */
        .node-summary { font-size: 0.85rem; color: var(--font-sub); font-weight: 600; margin-left: 10px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; transition: color 0.2s; }
        .node-summary:hover { color: var(--font-dark); }
        .node-summary i.fa-chevron-down { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .node-summary.is-open i.fa-chevron-down { transform: rotate(180deg); }
        
        .collapsible-stops-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .collapsible-stops-wrapper.is-open { grid-template-rows: 1fr; }
        .collapsible-stops-content { min-height: 0; }

        .transfer-walk-card { display: flex; align-items: center; gap: 18px; background: var(--canvas-bg); padding: 14px 20px; border-radius: 12px; margin: 15px 0 20px 12px; border: 1px dashed var(--border-line); }

        /* --- DASHBOARD TRAFIC --- */
        .live-traffic-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 5px; }
        .traffic-row-card { background: var(--canvas-bg); border: 1px solid var(--border-line); border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: space-between; transition: transform 0.2s; }
        .traffic-row-card:hover { transform: translateY(-2px); }
        
        .signal-light { width: 14px; height: 14px; border-radius: 50%; background-color: #cbd5e1; position: relative; transition: all 0.4s ease; }
        .signal-light.status-vert { background-color: var(--live-ok); box-shadow: 0 0 12px var(--live-ok); }
        .signal-light.status-orange { background-color: var(--live-warn); box-shadow: 0 0 12px var(--live-warn); }
        .signal-light.status-rouge { background-color: var(--live-crit); box-shadow: 0 0 12px var(--live-crit); }
    </style>
</head>
<body>

    <header class="app-bar">
        <img src="https://image.noelshack.com/fichiers/2026/28/2/1783387205-2b6a27e168543ce8099dc90780cd86d6-removebg-preview.png" alt="Logo Officiel Network" class="app-bar-logo">
        <button class="dark-mode-switch" id="theme-toggle-btn"><i class="fa-solid fa-moon"></i></button>
    </header>

    <div class="navigation-tabs">
        <button class="tab-trigger is-active line-font" onclick="handleTabExchange(this)">Itinéraires</button>
        <button class="tab-trigger line-font" onclick="handleTabExchange(this)">Horaires</button>
        <button class="tab-trigger line-font" onclick="handleTabExchange(this)">Infos Trafic</button>
        <button class="tab-trigger line-font" onclick="handleTabExchange(this)">Plans</button>
    </div>

    <section class="stage-banner">
        <h1 class="line-font">Recherche d'itinéraires</h1>
        <p>Planifiez vos déplacements en temps réel sur les réseaux de transports métropolitains.</p>
    </section>

    <main class="workspace" id="panel-search">
        <form id="route-builder-form" autocomplete="off">
            <div class="form-row">
                <div class="field-group">
                    <label>Arrêt de départ</label>
                    <input type="text" id="geo-start" class="control-input" placeholder="Saisissez un point de départ...">
                    <div id="box-sug-start" class="dropdown-suggestions"></div>
                </div>
                <div class="field-group">
                    <label>Arrêt d'arrivée</label>
                    <input type="text" id="geo-end" class="control-input" placeholder="Saisissez une destination...">
                    <div id="box-sug-end" class="dropdown-suggestions"></div>
                </div>
                <div class="field-group">
                    <label>Heure de départ</label>
                    <input type="datetime-local" id="geo-time" class="control-input">
                </div>
                <div class="field-group">
                    <button type="submit" class="submit-trigger line-font">RECHERCHER</button>
                </div>
            </div>
        </form>
    </main>

    <div class="skeleton-loader" id="loading-shimmer-mask">
        <img src="https://image.noelshack.com/fichiers/2026/28/2/1783387205-2b6a27e168543ce8099dc90780cd86d6-removebg-preview.png" alt="Chargement...">
    </div>

    <main class="workspace" id="panel-traffic" style="display: none;">
        <h2 class="line-font" style="font-size:1.1rem; margin-bottom:25px; display:flex; align-items:center; gap:10px;">
            <i class="fa-solid fa-satellite-dish" style="color:var(--brand-color)"></i> État du trafic en temps réel
        </h2>
        <div class="live-traffic-dashboard">
            <div class="traffic-row-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="route-badge line-font" style="background: var(--color-l26)">26 <div class="pmr-indicator"><i class="fa-solid fa-wheelchair"></i></div></div>
                    <div class="route-meta" style="margin-left:10px;">
                        <span class="route-meta-val line-font" style="font-size:0.95rem;">Ligne 26</span>
                        <span class="route-meta-lbl">Martigues</span>
                    </div>
                </div>
                <div id="realtime-light-26" class="signal-light"></div>
            </div>

            <div class="traffic-row-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="route-badge line-font" style="background: var(--color-lbam)">BM <div class="pmr-indicator"><i class="fa-solid fa-wheelchair"></i></div></div>
                    <div class="route-meta" style="margin-left:10px;">
                        <span class="route-meta-val line-font" style="font-size:0.95rem;">Ligne BAM</span>
                        <span class="route-meta-lbl">Miramas</span>
                    </div>
                </div>
                <div id="realtime-light-BAM" class="signal-light"></div>
            </div>

            <div class="traffic-row-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="route-badge line-font" style="background: var(--color-li)">I <div class="pmr-indicator"><i class="fa-solid fa-wheelchair"></i></div></div>
                    <div class="route-meta" style="margin-left:10px;">
                        <span class="route-meta-val line-font" style="font-size:0.95rem;">Ligne I (Istréen)</span>
                        <span class="route-meta-lbl">Istres</span>
                    </div>
                </div>
                <div id="realtime-light-I" class="signal-light"></div>
            </div>
        </div>
    </main>

    <section id="rendering-output-hub" class="output-container"></section>

    <script>
        // CONFIGURATION INTÉGRALE INTÉGRANT LES COMPORTEMENTS DE BRANCHES SUR LA LIGNE 26
        const networks = {
            "26": {
                color: "#e182b4", class: "l26", city: "Martigues",
                stops: ["Reveilla", "Hôpital Vallon", "Lycée Jean Lurcat", "Hameau", "Julien Olive", "Ginoux", "Vigneros", "Hôpital MTG", "Colline", "Di Lorto", "Asphodeles", "Les Lauriers", "Degas", "Renoir", "Seurat", "Matisse", "Pôle d'Échanges Danielle Casanova", "Coopérative", "Kennedy", "Paradis", "Doumer", "Place des Aires", "Mairie MTG", "Théâtre"],
                // Définition technique des branches pour guider vers le vrai terminus final
                branches: {
                    nord: ["Reveilla", "Hôpital Vallon", "Lycée Jean Lurcat", "Hameau", "Julien Olive", "Ginoux", "Vigneros"],
                    sud: ["Hôpital MTG", "Colline", "Di Lorto", "Asphodeles", "Les Lauriers", "Degas", "Renoir", "Seurat", "Matisse", "Pôle d'Échanges Danielle Casanova", "Coopérative", "Kennedy", "Paradis", "Doumer", "Place des Aires", "Mairie MTG", "Théâtre"]
                }
            },
            "BAM": {
                color: "#1b35b0", class: "lbam", city: "Miramas",
                stops: ["Jean Moulin", "Mazet", "Centre Commercial Sud", "Chave", "Miramas - Gare SNCF", "Briand - Centre Ville", "Théâtre Cocteau", "Levant", "Couvent", "Terrasses", "Essors", "Salle des Fêtes", "Village de Marques"]
            },
            "I": {
                color: "#6dc16d", class: "li", city: "Istres",
                stops: ["Gare de Rassuen", "Centre Commercial Cognets", "Prépaou", "Prépaou Piboules", "Prépaou Saladelles", "Prédina", "4 Vents Méditerranée", "CEC", "LaSalle", "Gare Routière", "Aimé Césaire", "Les Carmes - Centre d'art Polaris", "Crignan", "Guynemer", "Boucasson", "Charles Monier"]
            }
        };

        const staticStopsRegistry = [];
        for (const [lineId, net] of Object.entries(networks)) {
            net.stops.forEach(stopName => {
                staticStopsRegistry.push({ name: stopName, city: net.city, line: lineId, color: net.color, class: net.class });
            });
        }

        function handleTabExchange(tabElement) {
            document.querySelectorAll('.tab-trigger').forEach(el => el.classList.remove('is-active'));
            tabElement.classList.add('is-active');
            
            const pSearch = document.getElementById('panel-search');
            const pTraffic = document.getElementById('panel-traffic');
            const pOutput = document.getElementById('rendering-output-hub');
            
            pSearch.style.display = 'none';
            pTraffic.style.display = 'none';
            pOutput.style.display = 'none';
            
            if (tabElement.textContent === "Itinéraires") { pSearch.style.display = 'block'; } 
            else if (tabElement.textContent === "Infos Trafic") { pTraffic.style.display = 'block'; } 
            else {
                pOutput.style.display = 'block';
                pOutput.innerHTML = `<p style="text-align:center; padding:30px 10px; color:var(--font-sub); font-size:0.9rem;"><i class="fa-solid fa-bell-slash" style="display:block; margin-bottom:10px; font-size:1.4rem; color:var(--brand-color)"></i>Ce sous-module est en cours de synchronisation.</p>`;
            }
        }

        // THÈME SOMBRE
        const themeTrigger = document.getElementById('theme-toggle-btn');
        if (localStorage.getItem('user-ui-theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeTrigger.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }
        themeTrigger.onclick = () => {
            if (document.documentElement.hasAttribute('data-theme')) {
                document.documentElement.removeAttribute('data-theme');
                themeTrigger.innerHTML = '<i class="fa-solid fa-moon"></i>';
                localStorage.setItem('user-ui-theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeTrigger.innerHTML = '<i class="fa-solid fa-sun"></i>';
                localStorage.setItem('user-ui-theme', 'dark');
            }
        };

        function wireAutocompleteSystem(targetInputId, targetBoxId) {
            const field = document.getElementById(targetInputId);
            const container = document.getElementById(targetBoxId);

            field.oninput = () => {
                const searchStr = field.value.toLowerCase().trim();
                container.innerHTML = '';
                if (!searchStr) { container.style.display = 'none'; return; }

                const stack = staticStopsRegistry.filter(item => item.name.toLowerCase().includes(searchStr) || item.city.toLowerCase().includes(searchStr));
                if (stack.length) {
                    container.style.display = 'block';
                    stack.forEach(node => {
                        const div = document.createElement('div');
                        div.className = 'suggest-row';
                        div.innerHTML = `<div><strong>${node.name}</strong><small>(${node.city})</small></div><span class="pill-badge line-font ${node.class}">${node.line}</span>`;
                        div.onclick = () => { field.value = node.name; container.style.display = 'none'; };
                        container.appendChild(div);
                    });
                } else { container.style.display = 'none'; }
            };
            document.addEventListener('click', (ev) => { if (ev.target !== field) container.style.display = 'none'; });
        }
        wireAutocompleteSystem('geo-start', 'box-sug-start');
        wireAutocompleteSystem('geo-end', 'box-sug-end');

        const timeBox = document.getElementById('geo-time');
        const currentClock = new Date();
        currentClock.setMinutes(currentClock.getMinutes() - currentClock.getTimezoneOffset());
        timeBox.value = currentClock.toISOString().slice(0, 16);

        function compileTimeStr(d) { return d.toTimeString().slice(0, 5); }

        // SYSTÈME DE DÉPLIAGE FLUIDE DE L'ACCORDÉON DES ARRÊTS INTERMÉDIAIRES
        function toggleIntermediateStops(element) {
            element.classList.toggle('is-open');
            const wrapper = element.nextElementSibling;
            wrapper.classList.toggle('is-open');
        }

        document.getElementById('route-builder-form').onsubmit = (event) => {
            event.preventDefault();
            const fromQuery = document.getElementById('geo-start').value.trim();
            const toQuery = document.getElementById('geo-end').value.trim();
            const outBox = document.getElementById('rendering-output-hub');
            const skeleton = document.getElementById('loading-shimmer-mask');

            const startObj = staticStopsRegistry.find(s => s.name.toLowerCase() === fromQuery.toLowerCase());
            const endObj = staticStopsRegistry.find(s => s.name.toLowerCase() === toQuery.toLowerCase());

            outBox.style.display = 'none';
            if (!startObj || !endObj) {
                outBox.style.display = 'block';
                outBox.innerHTML = `<p style="color:var(--live-crit); text-align:center; font-weight:600;"><i class="fa-solid fa-circle-exclamation"></i> Saisie non concordante. Veuillez utiliser les suggestions.</p>`;
                return;
            }

            skeleton.style.display = 'block';
            
            setTimeout(() => {
                skeleton.style.display = 'none';
                outBox.style.display = 'block';
                let timeCursor = new Date(timeBox.value);

                // CAS UNIQUE DIRECT (MÊME RESEAU DE LIGNE)
                if (startObj.line === endObj.line) {
                    const lId = startObj.line;
                    const netData = networks[lId];
                    const idxStart = netData.stops.indexOf(startObj.name);
                    const idxEnd = netData.stops.indexOf(endObj.name);

                    let segmentStops = [];
                    let dynamicTerminus = "";

                    if (idxStart < idxEnd) {
                        segmentStops = netData.stops.slice(idxStart, idxEnd + 1);
                        // Logique de calcul de branche intelligente (Ligne 26) pour désigner le bon terminus
                        if (lId === "26" && netData.branches.nord.includes(endObj.name)) {
                            dynamicTerminus = "Vigneros";
                        } else {
                            dynamicTerminus = netData.stops[netData.stops.length - 1];
                        }
                    } else {
                        segmentStops = netData.stops.slice(idxEnd, idxStart + 1).reverse();
                        if (lId === "26" && netData.branches.sud.includes(endObj.name)) {
                            dynamicTerminus = "Théâtre";
                        } else {
                            dynamicTerminus = netData.stops[0];
                        }
                    }

                    const originNode = segmentStops[0];
                    const destinationNode = segmentStops[segmentStops.length - 1];
                    const intermediateNodes = segmentStops.slice(1, segmentStops.length - 1);

                    outBox.innerHTML = `
                        <div class="route-bar" style="--route-theme: ${startObj.color}">
                            <div class="route-badge line-font" style="background:${startObj.color}">
                                ${lId}
                                <div class="pmr-indicator"><i class="fa-solid fa-wheelchair"></i></div>
                            </div>
                            <div class="route-meta">
                                <span class="route-meta-lbl">direction</span>
                                <span class="route-meta-val line-font">${dynamicTerminus}</span>
                            </div>
                        </div>
                        <div class="itinerary-chain" style="--route-theme:${startObj.color}">
                            <div class="chain-node is-extremity">
                                <span class="node-time line-font">${compileTimeStr(timeCursor)}</span>
                                <span>Montée : <strong>${originNode}</strong></span>
                            </div>
                            
                            <div class="node-summary" onclick="toggleIntermediateStops(this)">
                                <i class="fa-solid fa-chevron-down"></i> 
                                <span>${intermediateNodes.length} arrêt(s) intermédiaire(s)</span>
                            </div>

                            <div class="collapsible-stops-wrapper">
                                <div class="collapsible-stops-content">
                                    ${intermediateNodes.map((name, i) => {
                                        timeCursor = new Date(timeCursor.getTime() + 2 * 60000);
                                        return `
                                        <div class="chain-node">
                                            <span class="node-time" style="color:var(--font-sub); font-weight:500;">${compileTimeStr(timeCursor)}</span>
                                            <span style="color:var(--font-sub);">${name}</span>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>

                            <div class="chain-node is-extremity">
                                <span class="node-time line-font">${compileTimeStr(new Date(timeCursor.getTime() + 2 * 60000))}</span>
                                <span>Descente : <strong>${destinationNode}</strong></span>
                            </div>
                        </div>
                    `;
                } 
                // CORRESPONDANCE INTER-RESEAUX
                else {
                    const firstLegEnd = new Date(timeCursor.getTime() + 15 * 60000);
                    const secondLegStart = new Date(firstLegEnd.getTime() + 5 * 60000);
                    const journeyEnd = new Date(secondLegStart.getTime() + 15 * 60000);

                    outBox.innerHTML = `
                        <div style="margin-bottom:20px; font-weight:700; font-size:0.95rem; color:var(--brand-color); display:flex; align-items:center; gap:8px;">
                            <i class="fa-solid fa-shuffle"></i> Trajet avec changement de quai
                        </div>
                        
                        <div class="route-bar" style="--route-theme: ${startObj.color}">
                            <div class="route-badge line-font" style="background:${startObj.color}">
                                ${startObj.line}
                                <div class="pmr-indicator"><i class="fa-solid fa-wheelchair"></i></div>
                            </div>
                            <div class="route-meta">
                                <span class="route-meta-lbl">direction</span>
                                <span class="route-meta-val line-font">Pôle d'Échanges Intercommunal</span>
                            </div>
                        </div>
                        <div class="itinerary-chain" style="--route-theme:${startObj.color}">
                            <div class="chain-node is-extremity">
                                <span class="node-time line-font">${compileTimeStr(timeCursor)}</span>
                                <span>Montée à l'arrêt : <strong>${startObj.name}</strong></span>
                            </div>
                            <div class="chain-node is-extremity">
                                <span class="node-time line-font">${compileTimeStr(firstLegEnd)}</span>
                                <span>Descente au Hub : <strong>Pôle d'Échanges Intercommunal</strong></span>
                            </div>
                        </div>

                        <div class="itinerary-chain is-walkway" style="--route-theme: var(--border-line)">
                            <div class="transfer-walk-card">
                                <div class="transfer-walk-icon"><i class="fa-solid fa-person-walking"></i></div>
                                <div style="font-size:0.85rem; color:var(--font-sub); font-weight:500;">
                                    <strong>Correspondance piétonne</strong><br>
                                    Rejoindre le quai suivant (env. 5 min).
                                </div>
                            </div>
                        </div>

                        <div class="route-bar" style="--route-theme: ${endObj.color}">
                            <div class="route-badge line-font" style="background:${endObj.color}">
                                ${endObj.line}
                                <div class="pmr-indicator"><i class="fa-solid fa-wheelchair"></i></div>
                            </div>
                            <div class="route-meta">
                                <span class="route-meta-lbl">direction</span>
                                <span class="route-meta-val line-font">${networks[endObj.line].stops[networks[endObj.line].stops.length - 1]}</span>
                            </div>
                        </div>
                        <div class="itinerary-chain" style="--route-theme:${endObj.color}">
                            <div class="chain-node is-extremity">
                                <span class="node-time line-font">${compileTimeStr(secondLegStart)}</span>
                                <span>Embarquement : <strong>Pôle d'Échanges Intercommunal</strong></span>
                            </div>
                            <div class="chain-node is-extremity">
                                <span class="node-time line-font">${compileTimeStr(journeyEnd)}</span>
                                <span>Arrivée à destination : <strong>${endObj.name}</strong></span>
                            </div>
                        </div>
                    `;
                }
            }, 800);
        };

        // --- LECTURE SECURISEE ET POLLING CONTRE LES DECONNEXIONS FIREBASE ---
        const FIREBASE_ENDPOINT = "https://aedan-mobilites-default-rtdb.europe-west1.firebasedatabase.app";
        
        function fetchFirebaseData() {
            fetch(`${FIREBASE_ENDPOINT}/.json?nocache=${Date.now()}`)
                .then(response => {
                    if (!response.ok) throw new Error("Déconnexion Firebase");
                    return response.json();
                })
                .then(serverData => {
                    if (!serverData) return;

                    // Extrait l'état global et l'imbrication data (gère à la fois status.26, status.BAM et status.data.I)
                    if (serverData.status) {
                        const mainStatus = serverData.status;
                        const nestedData = serverData.status.data || {};

                        updateVisualLight('26', mainStatus['26']);
                        updateVisualLight('BAM', mainStatus['BAM']);
                        updateVisualLight('I', nestedData['I']); // Cible l'imbrication exacte de ton iSTRÉEN
                    }

                    // Traitement dynamique du bandeau d'alerte général
                    if (serverData.globalAlert) {
                        handleBandeauAlerte(serverData.globalAlert);
                    } else {
                        let existBox = document.getElementById('app-live-banner');
                        if (existBox) existBox.remove();
                    }
                })
                .catch(err => console.error("Synchro suspendue :", err));
        }

        function updateVisualLight(targetLineKey, stateValue) {
            const lightElement = document.getElementById(`realtime-light-${targetLineKey}`);
            if (!lightElement || !stateValue) return;
            
            lightElement.className = "signal-light";
            if (stateValue === "vert") lightElement.classList.add("status-vert");
            if (stateValue === "orange") lightElement.classList.add("status-orange");
            if (stateValue === "rouge") lightElement.classList.add("status-rouge");
        }

        function handleBandeauAlerte(alertObj) {
            let existBox = document.getElementById('app-live-banner');
            
            if (!alertObj || !alertObj.text || alertObj.text === "") {
                if (existBox) existBox.remove();
                return;
            }

            if (existBox && existBox.getAttribute('data-text') === alertObj.text) {
                return;
            }
            
            if (existBox) existBox.remove();

            const bgBanner = alertObj.type === 'rouge' ? 'var(--live-crit)' : 'var(--live-warn)';
            const iconHTML = alertObj.type === 'rouge' ? '<i class="fa-solid fa-triangle-exclamation"></i>' : '<i class="fa-solid fa-circle-exclamation"></i>';

            const banner = document.createElement('div');
            banner.id = 'app-live-banner';
            banner.setAttribute('data-text', alertObj.text); 
            banner.style.background = bgBanner;
            banner.innerHTML = `
                <div class="banner-content">
                    ${iconHTML}
                    <span class="line-font">${alertObj.text}</span>
                </div>
                <button class="close-banner-btn" onclick="this.parentElement.remove()">&times;</button>
            `;
            document.body.prepend(banner);
        }
        
        // Polling continu toutes les 5 secondes
        fetchFirebaseData();
        setInterval(fetchFirebaseData, 5000);
    </script>
</body>
</html>
